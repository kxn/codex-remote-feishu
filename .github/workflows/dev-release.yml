name: Dev Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish as dev-latest. Defaults to master.
        required: false
        default: master
        type: string
      artifact_name:
        description: Optional prebuilt artifact name from the caller workflow
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: ""
        type: string
      artifact_name:
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  build-dev-assets:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.source.outputs.ref }}
      commit: ${{ steps.meta.outputs.commit }}
      short_commit: ${{ steps.meta.outputs.short_commit }}
      built_at: ${{ steps.meta.outputs.built_at }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Resolve source ref
        id: source
        run: |
          ref='${{ inputs.ref }}'
          if [[ -z "${ref}" ]]; then
            ref='master'
          fi
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.source.outputs.ref }}

      - name: Resolve Go version spec
        id: go_version
        shell: bash
        run: echo "version=$(bash scripts/ci/go-version-spec.sh)" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        if: ${{ inputs.artifact_name == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        if: ${{ inputs.artifact_name == '' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Resolve build metadata
        id: meta
        run: |
          commit="$(git rev-parse HEAD)"
          short_commit="$(git rev-parse --short=12 "${commit}")"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="dev-${short_commit}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "short_commit=${short_commit}" >> "${GITHUB_OUTPUT}"
          echo "built_at=${built_at}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install web dependencies
        if: ${{ inputs.artifact_name == '' }}
        working-directory: web
        run: npm ci

      - name: Build web
        if: ${{ inputs.artifact_name == '' }}
        working-directory: web
        run: npm run build

      - name: Download prebuilt artifacts
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: dist

      - name: Build artifacts
        if: ${{ inputs.artifact_name == '' }}
        env:
          CODEX_REMOTE_BUILD_FLAVOR: dev
          CODEX_REMOTE_PACKAGE_VERSION_LABEL: dev
        run: bash scripts/release/build-artifacts.sh "${{ steps.meta.outputs.version }}" dist --jobs 5 --skip-admin-ui-build

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Build Windows NSIS installer
        run: |
          bash scripts/release/build-windows-nsis.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --track alpha \
            --package-version-label dev \
            --dist-dir dist

      - name: Upload base dev dist
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-base-dist
          path: dist
          if-no-files-found: error
          compression-level: 0

      - name: Upload macOS packaging input
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-macos-input-dist
          path: |
            dist/codex-remote-feishu_*_darwin_amd64.tar.gz
            dist/codex-remote-feishu_*_darwin_arm64.tar.gz
          if-no-files-found: error
          compression-level: 0

  build-dev-macos-packaged-installer:
    needs: build-dev-assets
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-dev-assets.outputs.source_ref }}

      - name: Download macOS packaging input
        uses: actions/download-artifact@v4
        with:
          name: dev-release-macos-input-dist
          path: dist

      - name: Build macOS packaged installer
        run: |
          bash scripts/release/build-macos-packaged-installer.sh \
            --version "${{ needs.build-dev-assets.outputs.version }}" \
            --track alpha \
            --package-version-label dev \
            --dist-dir dist

      - name: Upload macOS packaged installer
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-macos-packaged-installer
          path: dist/codex-remote-feishu_dev_darwin_universal_installer.dmg
          if-no-files-found: error
          compression-level: 0

  publish:
    needs:
      - build-dev-assets
      - build-dev-macos-packaged-installer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.build-dev-assets.outputs.source_ref }}

      - name: Download base dev dist
        uses: actions/download-artifact@v4
        with:
          name: dev-release-base-dist
          path: dist

      - name: Download macOS packaged installer
        uses: actions/download-artifact@v4
        with:
          name: dev-release-macos-packaged-installer
          path: dist

      - name: Refresh checksums after macOS packaged installer
        run: bash scripts/release/write-checksums.sh dist

      - name: Build dev manifest
        env:
          CODEX_REMOTE_DEV_VERSION: ${{ needs.build-dev-assets.outputs.version }}
          CODEX_REMOTE_DEV_COMMIT: ${{ needs.build-dev-assets.outputs.commit }}
          CODEX_REMOTE_DEV_SHORT_COMMIT: ${{ needs.build-dev-assets.outputs.short_commit }}
          CODEX_REMOTE_DEV_BUILT_AT: ${{ needs.build-dev-assets.outputs.built_at }}
        run: bash scripts/release/build-dev-manifest.sh dist dist/dev-latest.json

      - name: Generate release notes
        env:
          VERSION: ${{ needs.build-dev-assets.outputs.version }}
          COMMIT: ${{ needs.build-dev-assets.outputs.commit }}
          BUILT_AT: ${{ needs.build-dev-assets.outputs.built_at }}
        run: bash scripts/release/dev-release-notes.sh > release-notes.md

      - name: Update dev-latest tag
        run: |
          git tag -f dev-latest "${{ needs.build-dev-assets.outputs.commit }}"
          git push origin refs/tags/dev-latest --force

      - name: Create or update dev-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view dev-latest >/dev/null 2>&1; then
            gh release edit dev-latest \
              --title dev-latest \
              --notes-file release-notes.md
          else
            gh release create dev-latest \
              --title dev-latest \
              --notes-file release-notes.md \
              --target "${{ needs.build-dev-assets.outputs.commit }}" \
              --prerelease
          fi
          gh release upload dev-latest dist/* --clobber

      - name: Verify dev-latest assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t expected_assets < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)
          mapfile -t release_assets < <(
            gh release view dev-latest --json assets \
              --jq '.assets[].name' |
              sort
          )

          for expected in "${expected_assets[@]}"; do
            if ! printf '%s\n' "${release_assets[@]}" | grep -Fx "${expected}" >/dev/null; then
              echo "missing dev-latest asset: ${expected}" >&2
              exit 1
            fi
          done
