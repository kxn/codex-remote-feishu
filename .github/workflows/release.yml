name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Explicit version to release, e.g. v1.0.0. Leave empty to auto-calculate.
        required: false
        default: ""
        type: string
      bump:
        description: Version bump strategy
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark the release as prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Check public docs for machine-local paths
        run: bash scripts/check/no-local-paths.sh

      - name: Check legacy names are gone
        run: bash scripts/check/no-legacy-names.sh

      - name: Check formatting
        run: |
          files="$(find cmd internal testkit -name '*.go' | sort)"
          output="$(gofmt -l ${files})"
          if [[ -n "${output}" ]]; then
            echo "${output}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Smoke test WebSetup release installer
        run: bash scripts/check/smoke-install-release.sh

      - name: Determine next version
        id: version
        run: |
          if [[ -n '${{ inputs.version }}' ]]; then
            version='${{ inputs.version }}'
          else
            version="$(BUMP_OVERRIDE='${{ inputs.bump }}' bash scripts/release/next-version.sh)"
          fi
          if [[ ! "${version}" =~ ^v[0-9] ]]; then
            version="v${version}"
          fi
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | grep -vx "${version}" | head -n1 || true)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build artifacts
        run: bash scripts/release/build-artifacts.sh "${{ steps.version.outputs.version }}"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}" \
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}" \
          bash scripts/release/release-notes.sh > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            flags+=(--draft)
          fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "${{ steps.version.outputs.version }}" dist/* \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            "${flags[@]}"
