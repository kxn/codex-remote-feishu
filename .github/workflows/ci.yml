name: CI

on:
  push:
    branches:
      - master
      - main
      - release/**
  pull_request:
    branches:
      - master
      - main
      - release/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Check public docs for machine-local paths
        run: bash scripts/check/no-local-paths.sh

      - name: Check legacy names are gone
        run: bash scripts/check/no-legacy-names.sh

      - name: Check formatting
        run: |
          files="$(find cmd internal testkit -name '*.go' | sort)"
          output="$(gofmt -l ${files})"
          if [[ -n "${output}" ]]; then
            echo "${output}"
            exit 1
          fi

      - name: Check release track versioning
        run: bash scripts/check/release-track-version.sh

      - name: Check release readiness script
        run: bash scripts/check/release-readiness-selftest.sh

      - name: Test web
        working-directory: web
        run: npm run test:run

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Build
        run: |
          go build ./cmd/...

      - name: Validate release packaging
        env:
          CODEX_REMOTE_BUILD_FLAVOR: shipping
          CODEX_REMOTE_PACKAGE_VERSION_LABEL: ci
        run: bash scripts/release/build-artifacts.sh v0.0.0-ci.0 dist-ci --skip-admin-ui-build

      - name: Test
        run: go test ./...

      - name: Test install and upgrade flows
        run: go test ./internal/app/install ./internal/app/wrapper ./internal/runtime ./internal/externalaccess -count=1

  go-platform:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: go test ./...

  publish-dev-release:
    needs:
      - quality-linux
      - go-platform
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: write
    uses: ./.github/workflows/dev-release.yml
    with:
      ref: ${{ github.sha }}
    secrets: inherit
