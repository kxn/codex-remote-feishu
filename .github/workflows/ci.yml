name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check public docs for machine-local paths
        run: bash scripts/check/no-local-paths.sh

      - name: Check legacy names are gone
        run: bash scripts/check/no-legacy-names.sh

      - name: Check formatting
        run: |
          files="$(find cmd internal testkit -name '*.go' | sort)"
          output="$(gofmt -l ${files})"
          if [[ -n "${output}" ]]; then
            echo "${output}"
            exit 1
          fi

      - name: Build
        run: |
          go build ./cmd/...

      - name: Smoke test WebSetup release installer
        run: bash scripts/check/smoke-install-release.sh

      - name: Test
        run: go test ./...
