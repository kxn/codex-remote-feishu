name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Check public docs for machine-local paths
        run: bash scripts/check/no-local-paths.sh

      - name: Check legacy names are gone
        run: bash scripts/check/no-legacy-names.sh

      - name: Check formatting
        run: |
          files="$(find cmd internal testkit -name '*.go' | sort)"
          output="$(gofmt -l ${files})"
          if [[ -n "${output}" ]]; then
            echo "${output}"
            exit 1
          fi

      - name: Check release track versioning
        run: bash scripts/check/release-track-version.sh

      - name: Test web
        working-directory: web
        run: npm run test:run

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Build
        run: |
          go build ./cmd/...

      - name: Test
        run: go test ./...
