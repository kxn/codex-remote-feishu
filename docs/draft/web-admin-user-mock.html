<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Remote 本地管理</title>
    <style>
      :root {
        --bg: #eef1ed;
        --panel: rgba(250, 252, 247, 0.9);
        --panel-strong: #fffefb;
        --ink: #223234;
        --muted: #657577;
        --line: rgba(34, 50, 52, 0.12);
        --accent: #17695b;
        --accent-strong: #124a40;
        --accent-soft: rgba(23, 105, 91, 0.1);
        --warn: #b97224;
        --warn-soft: rgba(185, 114, 36, 0.1);
        --danger: #b34e4e;
        --danger-soft: rgba(179, 78, 78, 0.1);
        --good: #177b55;
        --good-soft: rgba(23, 123, 85, 0.1);
        --shadow: 0 24px 60px rgba(21, 29, 33, 0.12);
        --radius-xl: 30px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(23, 105, 91, 0.12), transparent 28%),
          radial-gradient(circle at top left, rgba(249, 185, 98, 0.14), transparent 24%),
          linear-gradient(180deg, #f4f6f2 0%, #edf0ea 100%);
      }

      body {
        padding: 24px;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      a {
        color: var(--accent-strong);
      }

      .shell {
        max-width: 1400px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 286px minmax(0, 1fr);
        gap: 22px;
      }

      .sidebar,
      .main,
      .modal-card,
      .toast {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .sidebar {
        position: sticky;
        top: 24px;
        align-self: start;
        padding: 24px;
        border-radius: var(--radius-xl);
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: var(--shadow);
        display: grid;
        gap: 18px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .sidebar h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.12;
      }

      .sidebar p,
      .main p,
      .card p,
      .panel p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .nav-list {
        display: grid;
        gap: 10px;
      }

      .nav-button {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.62);
        text-align: left;
      }

      .nav-button.active {
        background: linear-gradient(135deg, rgba(23, 105, 91, 0.15), rgba(255, 255, 255, 0.9));
        box-shadow: inset 0 0 0 1px rgba(23, 105, 91, 0.14);
      }

      .nav-button small {
        display: block;
        color: var(--muted);
      }

      .mobile-nav-button {
        display: none;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-weight: 700;
      }

      .main {
        background: rgba(255, 255, 255, 0.62);
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.84);
        box-shadow: var(--shadow);
        overflow: hidden;
        min-height: calc(100vh - 48px);
      }

      .main-head {
        padding: 28px 32px 20px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-start;
      }

      .main-head h2 {
        margin: 0 0 10px;
        font-size: clamp(30px, 4vw, 44px);
        line-height: 1.06;
      }

      .head-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .page-body {
        padding: 26px 32px 34px;
        display: grid;
        gap: 20px;
      }

      .notice,
      .toast {
        border-radius: 18px;
        padding: 16px 18px;
        border: 1px solid transparent;
      }

      .notice strong,
      .toast strong {
        display: block;
        margin-bottom: 6px;
        font-size: 15px;
      }

      .notice.good,
      .toast.good {
        background: var(--good-soft);
        border-color: rgba(23, 123, 85, 0.12);
      }

      .notice.warn,
      .toast.warn {
        background: var(--warn-soft);
        border-color: rgba(185, 114, 36, 0.12);
      }

      .notice.danger,
      .toast.danger {
        background: var(--danger-soft);
        border-color: rgba(179, 78, 78, 0.12);
      }

      .card-grid {
        display: grid;
        gap: 16px;
      }

      .card-grid.four {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .card-grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card,
      .panel {
        background: var(--panel-strong);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(34, 50, 52, 0.08);
        padding: 22px;
        display: grid;
        gap: 14px;
      }

      .card h3,
      .panel h3,
      .panel h4 {
        margin: 0;
      }

      .stat-value {
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1;
        font-weight: 800;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .status-pill.good {
        background: var(--good-soft);
        color: var(--good);
      }

      .status-pill.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }

      .status-pill.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .status-pill.neutral {
        background: rgba(101, 117, 119, 0.12);
        color: #556467;
      }

      .attention-list,
      .task-list,
      .support-list {
        display: grid;
        gap: 12px;
      }

      .attention-row,
      .task-row,
      .support-row {
        display: grid;
        gap: 10px;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
      }

      .row-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .button-row,
      .form-actions,
      .modal-actions,
      .switch-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button-primary,
      .button-secondary,
      .button-ghost,
      .button-danger {
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        font-weight: 700;
        transition: transform 140ms ease, filter 140ms ease;
      }

      .button-primary:hover,
      .button-secondary:hover,
      .button-ghost:hover,
      .button-danger:hover {
        transform: translateY(-1px);
      }

      .button-primary {
        background: linear-gradient(135deg, var(--accent), #23947f);
        color: #fff;
      }

      .button-secondary {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .button-ghost {
        background: rgba(34, 50, 52, 0.06);
        color: var(--ink);
      }

      .button-danger {
        background: rgba(179, 78, 78, 0.1);
        color: var(--danger);
      }

      .button-primary:disabled,
      .button-secondary:disabled,
      .button-ghost:disabled,
      .button-danger:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .split-layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 18px;
      }

      .app-list {
        display: grid;
        gap: 12px;
      }

      .app-list button {
        width: 100%;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(34, 50, 52, 0.08);
        text-align: left;
        display: grid;
        gap: 8px;
      }

      .app-list button.active {
        background: linear-gradient(135deg, rgba(23, 105, 91, 0.12), rgba(255, 255, 255, 0.92));
        box-shadow: inset 0 0 0 1px rgba(23, 105, 91, 0.14);
      }

      .list-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      .field-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-grid .wide {
        grid-column: 1 / -1;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 14px;
        font-weight: 700;
      }

      .field input,
      .field textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(34, 50, 52, 0.14);
        background: #fffef9;
        color: var(--ink);
      }

      .field textarea {
        min-height: 120px;
        resize: vertical;
      }

      .field-error {
        color: var(--danger);
        font-size: 13px;
      }

      .summary-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .details {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(248, 250, 246, 0.82);
      }

      .details summary {
        cursor: pointer;
        list-style: none;
        padding: 16px 18px;
        font-weight: 700;
      }

      .details summary::-webkit-details-marker {
        display: none;
      }

      .details-body {
        padding: 0 18px 18px;
        display: grid;
        gap: 14px;
      }

      .support-copy {
        padding: 16px;
        border-radius: 16px;
        background: rgba(23, 105, 91, 0.06);
        border: 1px solid rgba(23, 105, 91, 0.08);
      }

      .support-copy code {
        display: block;
        margin-top: 10px;
        padding: 14px;
        border-radius: 14px;
        background: #f5f3ee;
        overflow: auto;
        white-space: pre-wrap;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: min(360px, calc(100vw - 32px));
        display: none;
        box-shadow: 0 20px 50px rgba(22, 30, 35, 0.18);
        z-index: 16;
      }

      .toast.show {
        display: block;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(20, 28, 32, 0.52);
        z-index: 20;
      }

      .modal.open {
        display: flex;
      }

      .modal-card {
        width: min(560px, 100%);
        background: var(--panel-strong);
        border-radius: 30px;
        padding: 24px;
        box-shadow: 0 26px 70px rgba(18, 25, 30, 0.24);
        display: grid;
        gap: 14px;
      }

      .modal-card h3 {
        margin: 0;
        font-size: 28px;
      }

      .inline-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      @media (max-width: 1120px) {
        body {
          padding: 16px;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          display: none;
        }

        .sidebar.open {
          display: grid;
        }

        .mobile-nav-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .card-grid.four,
        .card-grid.two,
        .split-layout,
        .field-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .main-head,
        .page-body {
          padding-left: 18px;
          padding-right: 18px;
        }

        .head-actions,
        .button-row,
        .form-actions,
        .modal-actions {
          width: 100%;
        }

        .head-actions button,
        .button-row button,
        .form-actions button,
        .modal-actions button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="modal" class="modal" aria-live="polite"></div>
    <div id="toast" class="toast"></div>
    <script>
      const sections = [
        { id: "overview", label: "概览", hint: "先看这台机器现在是否能正常使用。" },
        { id: "apps", label: "飞书应用", hint: "新增、接入和维护飞书应用。" },
        { id: "instances", label: "工作实例", hint: "确认当前有哪些实例在线。" },
        { id: "storage", label: "文档与图片", hint: "按需清理旧内容。" },
        { id: "vscode", label: "VS Code", hint: "继续处理这台机器上的 VS Code。" },
        { id: "support", label: "当前摘要", hint: "需要转发给别人时再打开。" },
      ];

      const state = {
        navOpen: window.innerWidth > 1120,
        section: "overview",
        notice: {
          tone: "good",
          title: "这台机器现在可以正常使用",
          message: "如果你要继续处理某一项，直接从下面的分区进入即可。",
        },
        toast: null,
        modal: null,
        selectedAppId: "app-main",
        appDraft: {},
        appErrors: {},
        onboardingMode: "new",
        supportExpanded: false,
        vscodeScenario: "current",
        vscodeReady: false,
        apps: [
          {
            id: "app-main",
            name: "团队飞书应用",
            appId: "cli_team_001",
            appSecret: "secret_team_001",
            enabled: true,
            status: { tone: "good", label: "可用", detail: "当前这条飞书应用已经可以正常对话。" },
            pending: [
              { id: "preview", title: "补开文档预览权限", detail: "如果你要把 Markdown 预览上传到飞书云盘，再补这一项即可。", done: false },
            ],
            lastNotice: null,
          },
          {
            id: "app-ops",
            name: "值班飞书应用",
            appId: "cli_ops_019",
            appSecret: "secret_ops_019",
            enabled: true,
            status: { tone: "warn", label: "待补全", detail: "这条飞书应用已经接进来，但还有基础项没有补齐。" },
            pending: [
              { id: "verify", title: "重新测试连接", detail: "建议先确认这份凭证仍然可用。", done: false },
              { id: "publish", title: "完成发布确认", detail: "让最近做的后台设置正式生效。", done: false },
            ],
            lastNotice: "最近一次保存已经成功，但你还没有重新确认连接。",
          },
        ],
        instances: [
          { id: "inst-1", name: "官网改版", workspace: "品牌官网", status: { tone: "good", label: "在线" }, detail: "刚刚还有新内容返回。" },
          { id: "inst-2", name: "知识库整理", workspace: "团队知识库", status: { tone: "neutral", label: "空闲" }, detail: "目前没有新的进行中任务。" },
        ],
        storage: {
          images: { count: 28, size: "126 MB", active: 4 },
          previews: [
            { id: "team", name: "团队飞书应用", status: { tone: "good", label: "正常" }, files: 16, lastUsed: "今天 14:20" },
            { id: "ops", name: "值班飞书应用", status: { tone: "warn", label: "可清理" }, files: 42, lastUsed: "3 天前" },
          ],
        },
      };

      function activeApp() {
        return state.apps.find((app) => app.id === state.selectedAppId) || null;
      }

      function resetDraftFromApp() {
        const app = activeApp();
        state.appDraft = app
          ? {
              name: app.name,
              appId: app.appId,
              appSecret: app.appSecret,
              enabled: app.enabled,
            }
          : { name: "", appId: "", appSecret: "", enabled: true };
        state.appErrors = {};
      }

      resetDraftFromApp();

      function statusHTML(tone, text) {
        return '<span class="status-pill ' + tone + '">' + text + "</span>";
      }

      function setNotice(tone, title, message) {
        state.notice = { tone, title, message };
      }

      function showToast(tone, title, message) {
        state.toast = { tone, title, message };
        renderToast();
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          state.toast = null;
          renderToast();
        }, 2600);
      }

      function openModal(content) {
        state.modal = content;
        renderModal();
      }

      function closeModal() {
        state.modal = null;
        renderModal();
      }

      function switchSection(sectionId) {
        state.section = sectionId;
        if (window.innerWidth <= 1120) {
          state.navOpen = false;
        }
        render();
      }

      function selectApp(appId) {
        state.selectedAppId = appId;
        resetDraftFromApp();
        setNotice("neutral", "", "");
        render();
      }

      function updateDraft(field, value) {
        state.appDraft[field] = field === "enabled" ? value : value;
        if (state.appErrors[field]) {
          delete state.appErrors[field];
        }
        render();
      }

      function saveApp() {
        const errors = {};
        if (!state.appDraft.name.trim()) {
          errors.name = "请先给这条飞书应用起一个容易辨认的名字。";
        }
        if (!state.appDraft.appId.trim()) {
          errors.appId = "请先填写 App ID。";
        }
        if (!state.appDraft.appSecret.trim()) {
          errors.appSecret = "请先填写 App Secret。";
        }
        state.appErrors = errors;
        if (Object.keys(errors).length) {
          setNotice("danger", "这次保存还没有完成", "请先修正当前字段，再继续保存。");
          render();
          return;
        }
        const app = activeApp();
        app.name = state.appDraft.name.trim();
        app.appId = state.appDraft.appId.trim();
        app.appSecret = state.appDraft.appSecret.trim();
        app.enabled = Boolean(state.appDraft.enabled);
        app.lastNotice = "本地更改已经保存。";
        app.status = {
          tone: "warn",
          label: "待确认",
          detail: "这次更改已经保存，建议马上重新测试连接，确认现在还能正常使用。",
        };
        setNotice("good", "更改已保存", "建议下一步立即测试连接，避免把旧状态当成仍然可用。");
        showToast("good", "已保存", "飞书应用信息已更新。");
        render();
      }

      function verifyApp() {
        const app = activeApp();
        if (!state.appDraft.appId.trim() || !state.appDraft.appSecret.trim()) {
          state.appErrors.appId = state.appDraft.appId.trim() ? "" : "请先填写 App ID。";
          state.appErrors.appSecret = state.appDraft.appSecret.trim() ? "" : "请先填写 App Secret。";
          setNotice("danger", "还不能测试连接", "请先把必填字段补齐。");
          render();
          return;
        }
        if (state.appDraft.appId.startsWith("bad_")) {
          app.lastNotice = "这次连接测试失败，请核对你当前复制的是不是这条飞书应用的凭证。";
          app.status = {
            tone: "danger",
            label: "连接失败",
            detail: "目前还不能正常使用，请先修正这条飞书应用的凭证。",
          };
          setNotice("danger", "连接测试失败", "请核对 App ID、App Secret，以及飞书后台里这条应用是否仍然启用。");
          render();
          return;
        }
        app.status = {
          tone: "good",
          label: "可用",
          detail: "连接测试通过，这条飞书应用现在可以继续使用。",
        };
        app.lastNotice = "连接测试刚刚通过。";
        app.pending = app.pending.filter((item) => item.id !== "verify");
        setNotice("good", "连接测试通过", "这条飞书应用已经确认可用。");
        showToast("good", "已通过", "你可以继续补齐其它事项。");
        render();
      }

      function reconnectApp() {
        const app = activeApp();
        app.lastNotice = "已经重新拉起这条飞书应用的连接，状态会在下一次刷新后更新。";
        setNotice("warn", "已触发重新连接", "如果你刚改完飞书后台设置，可以稍等片刻再看状态。");
        showToast("warn", "已发起", "重新连接请求已发送。");
        render();
      }

      function toggleAppEnabled() {
        const app = activeApp();
        app.enabled = !app.enabled;
        state.appDraft.enabled = app.enabled;
        app.status = app.enabled
          ? { tone: "warn", label: "待确认", detail: "已经重新启用，建议马上测试连接。" }
          : { tone: "neutral", label: "已停用", detail: "这条飞书应用已经停用，不会再被默认使用。" };
        setNotice("good", app.enabled ? "已重新启用" : "已停用", app.enabled ? "建议现在就重新测试连接。" : "以后需要时可以再启用。");
        render();
      }

      function toggleTask(taskId) {
        const app = activeApp();
        const task = app.pending.find((item) => item.id === taskId);
        if (!task) {
          return;
        }
        task.done = !task.done;
        render();
      }

      function completePendingTasks() {
        const app = activeApp();
        const undone = app.pending.filter((item) => !item.done);
        if (undone.length) {
          setNotice("warn", "还有待处理项", "先把这张卡片里的待处理项完成，再刷新状态。");
          render();
          return;
        }
        app.pending = [];

          type: "confirm",

          message: "删除后，这台机器将不再继续使用它。这个操作不会帮你删除飞书开放平台里的原应用。",

          danger: true,
          onConfirm: () => {
            state.apps = state.apps.filter((item) => item.id !== app.id);

            setNotice("warn", "已删除当前飞书应用", state.apps.length ? "你可以继续管理列表里的其它飞书应用。" : "当前机器还没有飞书应用，建议先新增一条。");

            closeModal();
            render();
          },

        openModal({

          onConfirm: () => {

            state.storage.images.size = "34 MB";

            closeModal();
            render();

        });

        const item = state.storage.previews.find((preview) => preview.id === id);

          type: "confirm",

            render();

        });

      function renderApps() {

        return (

          modal.className = "modal";
          modal.innerHTML = "";

        if (state.modal.type === "new-app") {
          modal.className = "modal open";
          modal.innerHTML =
            '<div class="modal-card"><h3>新增飞书应用</h3><p>选择一种方式继续。</p><div class="button-row"><button class="button-primary" type="button" onclick="saveNewApp(\'new\')">扫码新建飞书应用</button><button class="button-secondary" type="button" onclick="saveNewApp(\'existing\')">接入已有飞书应用</button></div><div class="modal-actions"><button class="button-ghost" type="button" onclick="closeModal()">取消</button></div></div>';
          return;
        }
        if (state.modal.type === "confirm") {
          modal.className = "modal open";
          modal.innerHTML =
            '<div class="modal-card"><h3>' +
            state.modal.title +
            "</h3><p>" +
            state.modal.message +
            '</p><div class="modal-actions"><button class="' +
            (state.modal.danger ? "button-danger" : "button-primary") +
            '" type="button" onclick="confirmModalAction()">' +
            state.modal.confirmLabel +
            '</button><button class="button-ghost" type="button" onclick="closeModal()">取消</button></div></div>';
          return;
        }
        modal.className = "modal open";
        modal.innerHTML =
          '<div class="modal-card"><h3>' +
          state.modal.title +
          "</h3><p>" +
          state.modal.message +
          '</p><pre style="margin:0;padding:14px;border-radius:14px;background:#f6f3ed;white-space:pre-wrap;overflow:auto;">' +
          escapeHTML(state.modal.detail || "") +
          '</pre><div class="modal-actions"><button class="button-primary" type="button" onclick="closeModal()">我知道了</button></div></div>';
      }

      function renderToast() {
        const toast = document.getElementById("toast");
        if (!state.toast) {
          toast.className = "toast";
          toast.innerHTML = "";
          return;
        }
        toast.className = "toast show " + state.toast.tone;
        toast.innerHTML = "<strong>" + state.toast.title + "</strong><p>" + state.toast.message + "</p>";
      }

      function confirmModalAction() {
        if (state.modal && state.modal.onConfirm) {
          state.modal.onConfirm();
        }
      }

      function refreshPage() {
        setNotice("good", "状态已刷新", "你现在看到的是最新结果。");
        showToast("good", "已刷新", "当前页面状态已更新。");
        render();
      }

      function focusOpsApp() {
        state.section = "apps";
        state.selectedAppId = "app-ops";
        resetDraftFromApp();
        setNotice("warn", "已定位到值班飞书应用", "你现在可以直接在当前页测试连接并处理待补全项。");
        render();
      }

      function setVSCodeScenario(value) {
        state.vscodeScenario = value;
        render();
      }

      function toggleSupport(event) {
        event.preventDefault();
        state.supportExpanded = !state.supportExpanded;
        render();
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      window.switchSection = switchSection;
      window.toggleNav = toggleNav;
      window.selectApp = selectApp;
      window.updateDraft = updateDraft;
      window.saveApp = saveApp;
      window.verifyApp = verifyApp;
      window.reconnectApp = reconnectApp;
      window.toggleAppEnabled = toggleAppEnabled;
      window.toggleTask = toggleTask;
      window.completePendingTasks = completePendingTasks;
      window.beginNewApp = beginNewApp;
      window.saveNewApp = saveNewApp;
      window.closeModal = closeModal;
      window.confirmDeleteApp = confirmDeleteApp;
      window.confirmModalAction = confirmModalAction;
      window.cleanupImages = cleanupImages;
      window.cleanupPreview = cleanupPreview;
      window.continueVSCode = continueVSCode;
      window.refreshPage = refreshPage;
      window.focusOpsApp = focusOpsApp;
      window.setVSCodeScenario = setVSCodeScenario;
      window.toggleSupport = toggleSupport;
      window.copySupportInfo = copySupportInfo;

      window.addEventListener("resize", () => {
        if (window.innerWidth > 1120) {
          state.navOpen = true;
        }
      });

      render();
    </script>
  </body>
</html>
