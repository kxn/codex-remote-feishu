<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Remote 安装程序</title>
    <style>
      :root {
        --bg: #f3f6f4;
        --panel: #ffffff;
        --line: #d6e2dd;
        --ink: #14211e;
        --sub: #4a615b;
        --muted: #69807a;
        --brand: #0e8269;
        --brand-2: #0a6b56;
        --good: #1f7f40;
        --warn: #a76400;
        --bad: #b0283b;
        --shadow: 0 14px 36px rgba(9, 28, 23, 0.08);
        --radius-xl: 24px;
        --radius-lg: 16px;
        --radius-md: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          "Avenir Next",
          "PingFang SC",
          "Microsoft YaHei",
          "Noto Sans CJK SC",
          sans-serif;
        background:
          radial-gradient(900px 460px at -12% -20%, #c6efe2 0%, transparent 58%),
          radial-gradient(760px 420px at 112% -15%, #fae8c3 0%, transparent 54%),
          var(--bg);
      }

      .shell {
        max-width: 1220px;
        margin: 28px auto;
        padding: 0 18px 30px;
      }

      .topbar {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        padding: 18px 20px;
      }

      .title {
        margin: 0;
        font-size: 28px;
      }

      .notice-slot {
        margin-top: 14px;
        min-height: 40px;
      }

      .notice {
        border-radius: 10px;
        padding: 11px 13px;
        font-size: 14px;
        border: 1px solid transparent;
      }

      .notice.good {
        color: var(--good);
        background: #edf9f0;
        border-color: #cbe6d2;
      }

      .notice.warn {
        color: var(--warn);
        background: #fff6e9;
        border-color: #efd9b5;
      }

      .notice.bad {
        color: var(--bad);
        background: #fff0f3;
        border-color: #efcbd2;
      }

      .layout {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 270px 1fr;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }

      .card-head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .card-title {
        margin: 0;
        font-size: 18px;
      }

      .card-desc {
        margin: 8px 0 0;
        color: var(--sub);
        font-size: 14px;
      }

      .card-body {
        padding: 16px 18px 18px;
      }

      .step-list {
        padding: 10px;
      }

      .step-btn {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fff;
        text-align: left;
        padding: 10px 12px;
        margin: 6px 0;
        cursor: pointer;
        color: var(--ink);
        font-size: 14px;
      }

      .step-btn.active {
        background: #ebfaf6;
        border-color: #7dc8b8;
      }

      .step-btn.done {
        border-color: #b9e1cc;
      }

      .step-meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .btn {
        border: none;
        border-radius: 10px;
        font-size: 14px;
        padding: 10px 14px;
        cursor: pointer;
      }

      .btn.primary {
        background: var(--brand);
        color: #fff;
      }

      .btn.primary:hover {
        background: var(--brand-2);
      }

      .btn.secondary {
        background: #e5f3ef;
        color: #15473b;
      }

      .btn.ghost {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--sub);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 5px 10px;
        font-size: 12px;
        color: var(--sub);
        background: #fff;
      }

      .tag.warn {
        color: var(--warn);
        background: #fff6e9;
        border-color: #efd9b5;
      }

      .hint {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 13px;
        color: var(--sub);
      }

      .input,
      .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 11px;
        font-size: 14px;
        color: var(--ink);
        background: #fff;
      }

      .textarea {
        min-height: 126px;
        resize: vertical;
        font-family:
          "JetBrains Mono",
          "Consolas",
          monospace;
        font-size: 12px;
      }

      .line-list {
        margin: 10px 0 0;
        padding: 0 0 0 20px;
        color: var(--sub);
      }

      .line-list li {
        margin: 7px 0;
      }

      .link {
        color: #0b6b57;
        text-decoration: none;
      }

      .link:hover {
        text-decoration: underline;
      }

      .scan-stage {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #f7fbf9;
        padding: 14px;
      }

      .qr-frame {
        width: 220px;
        max-width: 100%;
        aspect-ratio: 1 / 1;
        border: 1px solid #bdd8d0;
        border-radius: 12px;
        background:
          linear-gradient(45deg, #eaf5f2 25%, transparent 25%) -8px 0 / 16px 16px,
          linear-gradient(-45deg, #eaf5f2 25%, transparent 25%) -8px 0 / 16px 16px,
          linear-gradient(45deg, transparent 75%, #eaf5f2 75%) -8px 0 / 16px 16px,
          linear-gradient(-45deg, transparent 75%, #eaf5f2 75%) -8px 0 / 16px 16px,
          #fff;
        display: grid;
        place-items: center;
        color: #215449;
        font-size: 13px;
      }

      .timeline {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .timeline-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        background: #fff;
        font-size: 13px;
        color: var(--sub);
      }

      .done-card {
        border: 1px solid #bde3cd;
        border-radius: 14px;
        background: #edf9f0;
        padding: 14px;
      }

      .done-title {
        margin: 0;
        font-size: 18px;
        color: #1c6f38;
      }

      .done-sub {
        margin: 7px 0 0;
        color: #2a6348;
        font-size: 14px;
      }

      @media (max-width: 980px) {
        .layout,
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .shell {
          margin: 14px auto;
          padding: 0 12px 20px;
        }

        .topbar {
          padding: 14px;
        }

        .title {
          font-size: 23px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1 class="title">Codex Remote 安装程序</h1>
        <div id="globalNotice" class="notice-slot"></div>
      </header>

      <main class="layout">
        <aside class="card">
          <div class="card-head">
            <h2 class="card-title">设置流程</h2>
            <p class="card-desc">可随时回看已完成步骤。</p>
          </div>
          <div id="setupSteps" class="step-list"></div>
        </aside>

        <section class="card">
          <div class="card-head">
            <h2 id="stepTitle" class="card-title"></h2>
            <p id="stepDesc" class="card-desc"></p>
          </div>
          <div id="setupContent" class="card-body"></div>
        </section>
      </main>
    </div>

    <script>
      const steps = [
        { id: "env", name: "环境检查" },
        { id: "connect", name: "飞书连接" },
        { id: "permission", name: "权限检查" },
        { id: "events", name: "事件订阅" },
        { id: "callback", name: "回调配置" },
        { id: "menu", name: "菜单确认" },
        { id: "autostart", name: "自动启动" },
        { id: "vscode", name: "VS Code 集成" },
        { id: "done", name: "完成" },
      ];

      const state = {
        step: "env",
        done: {},
        env: { status: "checking" },
        connect: {
          mode: "qr",
          verified: false,
          qr: { status: "idle", pollCount: 0, timer: null },
          manual: { name: "", appId: "", appSecret: "", tip: "", tipTone: "warn" },
        },
        permission: {
          status: "idle",
          pass: false,
          checkCount: 0,
          missing: ["drive:drive", "im:datasync.feed_card.time_sensitive:write"],
        },
        events: { sent: false },
        callback: { sent: false },
        autostart: {
          status: "idle",
          supported: null,
          enabledChoice: null,
        },
        vscode: { choice: null, integrated: false },
      };

      const setupSteps = document.getElementById("setupSteps");
      const stepTitle = document.getElementById("stepTitle");
      const stepDesc = document.getElementById("stepDesc");
      const setupContent = document.getElementById("setupContent");
      const globalNotice = document.getElementById("globalNotice");

      function pushNotice(text, tone = "good") {
        globalNotice.innerHTML = `<div class="notice ${tone}">${text}</div>`;
        window.clearTimeout(pushNotice._timer);
        pushNotice._timer = window.setTimeout(() => {
          globalNotice.innerHTML = "";
        }, 3400);
      }

      function gotoStep(step, auto) {
        state.step = step;
        render();
        if (auto) {
          runStepAuto(step);
        }
      }

      function runStepAuto(step) {
        if (step === "permission") {
          autoCheckPermission();
          return;
        }
        if (step === "events") {
          autoSendEventTest();
          return;
        }
        if (step === "callback") {
          autoSendCallbackTest();
          return;
        }
        if (step === "autostart") {
          autoDetectAutostart();
        }
      }

      function renderStepList() {
        const currentIndex = steps.findIndex((x) => x.id === state.step);
        setupSteps.innerHTML = steps
          .map((item, index) => {
            const done = Boolean(state.done[item.id]);
            const active = item.id === state.step;
            const cls = active ? "active" : done ? "done" : "";
            const meta = done ? "已完成" : active ? "进行中" : "待处理";
            return `<button class="step-btn ${cls}" data-step="${item.id}" data-index="${index}">
              <div>${item.name}</div>
              <div class="step-meta">${meta}</div>
            </button>`;
          })
          .join("");

        setupSteps.querySelectorAll(".step-btn").forEach((node) => {
          node.addEventListener("click", () => {
            const index = Number(node.dataset.index);
            if (index <= currentIndex || state.done[steps[index].id]) {
              gotoStep(node.dataset.step, false);
            }
          });
        });
      }

      function setStepContent(title, desc, html) {
        stepTitle.textContent = title;
        stepDesc.textContent = desc;
        setupContent.innerHTML = html;
      }

      function renderEnvStep() {
        const s = state.env.status;
        if (s === "checking") {
          setStepContent("环境检查", "进入后自动检查服务与运行条件。", `<div class="notice warn">正在检查当前环境，请稍候...</div>`);
          return;
        }
        if (s === "failed") {
          setStepContent(
            "环境检查",
            "请先修复当前环境问题。",
            `<div class="notice bad">当前服务尚未就绪，请确认服务状态后重试。</div>
             <div class="row" style="margin-top:12px"><button id="retryEnv" class="btn secondary">重新检查</button></div>`
          );
          document.getElementById("retryEnv").onclick = () => {
            state.env.status = "checking";
            render();
            window.setTimeout(() => {
              state.env.status = "ready";
              state.done.env = true;
              gotoStep("connect", true);
              pushNotice("环境正常，已进入飞书连接。");
            }, 850);
          };
          return;
        }
        setStepContent("环境检查", "检查通过后会自动进入下一步。", `<div class="notice good">环境检查通过，正在进入飞书连接...</div>`);
      }

      function renderConnectStep() {
        const mode = state.connect.mode;
        const qr = state.connect.qr;
        const manual = state.connect.manual;

        setStepContent(
          "飞书连接",
          "选择扫码创建或手动输入，连接验证通过后会自动进入下一步。",
          `<div class="tag-row">
             <button id="modeQr" class="btn ${mode === "qr" ? "primary" : "ghost"}">扫码创建</button>
             <button id="modeManual" class="btn ${mode === "manual" ? "primary" : "ghost"}">手动输入</button>
           </div>
           <div id="connectPanel" style="margin-top:14px"></div>`
        );

        document.getElementById("modeQr").onclick = () => {
          state.connect.mode = "qr";
          render();
        };
        document.getElementById("modeManual").onclick = () => {
          state.connect.mode = "manual";
          render();
        };

        const panel = document.getElementById("connectPanel");
        if (mode === "manual") {
          panel.innerHTML = `
            <div class="grid-2">
              <div class="field">
                <label>机器人名称</label>
                <input id="mName" class="input" placeholder="例如：团队机器人" value="${escapeAttr(manual.name)}" />
              </div>
              <div class="field">
                <label>App ID</label>
                <input id="mAppId" class="input" placeholder="请输入 App ID" value="${escapeAttr(manual.appId)}" />
              </div>
            </div>
            <div class="field" style="margin-top:12px">
              <label>App Secret</label>
              <input id="mSecret" class="input" placeholder="请输入 App Secret" value="${escapeAttr(manual.appSecret)}" />
            </div>
            <div class="row" style="margin-top:12px">
              <button id="manualVerify" class="btn primary">验证并继续</button>
            </div>
            <div style="margin-top:10px">${manual.tip ? `<div class="notice ${manual.tipTone}">${manual.tip}</div>` : ""}</div>
          `;
          document.getElementById("manualVerify").onclick = () => {
            manual.name = document.getElementById("mName").value.trim();
            manual.appId = document.getElementById("mAppId").value.trim();
            manual.appSecret = document.getElementById("mSecret").value.trim();
            if (!manual.appId || !manual.appSecret) {
              manual.tip = "请填写完整的 App ID 和 App Secret。";
              manual.tipTone = "bad";
              render();
              return;
            }
            manual.tip = "验证通过，连接已建立。正在进入权限检查...";
            manual.tipTone = "good";
            state.done.connect = true;
            state.connect.verified = true;
            render();
            window.setTimeout(() => {
              gotoStep("permission", true);
              pushNotice("连接验证成功。");
            }, 820);
          };
          return;
        }

        if (qr.status === "idle") {
          startQrPolling();
          return;
        }

        panel.innerHTML = `
          <div class="scan-stage">
            <div class="grid-2">
              <div>
                <h3 style="margin:0;font-size:16px">扫码创建</h3>
                <div style="margin-top:10px" class="qr-frame">扫码创建页面</div>
              </div>
              <div>
                <div id="qrAction" style="margin-top:12px"></div>
              </div>
            </div>
          </div>
        `;

        const qrAction = document.getElementById("qrAction");
        if (qr.status === "polling") {
          qrAction.innerHTML = `<div class="notice warn">正在等待扫码结果（第 ${qr.pollCount} 次检查）...</div>
                                <div class="row" style="margin-top:10px"><button id="switchManual" class="btn ghost">改用手动输入</button></div>`;
          document.getElementById("switchManual").onclick = () => {
            stopQrPolling();
            state.connect.mode = "manual";
            render();
          };
          return;
        }
        if (qr.status === "ready") {
          qrAction.innerHTML = `<div class="notice good">扫码成功，连接验证已通过，正在进入权限检查...</div>`;
          return;
        }
        qrAction.innerHTML = `<div class="notice bad">扫码超时，请重新开始。</div>
                              <div class="row" style="margin-top:10px">
                                <button id="restartQr" class="btn secondary">重新扫码</button>
                                <button id="switchManual2" class="btn ghost">改用手动输入</button>
                              </div>`;
        document.getElementById("restartQr").onclick = () => startQrPolling();
        document.getElementById("switchManual2").onclick = () => {
          state.connect.mode = "manual";
          render();
        };
      }

      function startQrPolling() {
        stopQrPolling();
        state.connect.qr.status = "polling";
        state.connect.qr.pollCount = 0;
        render();
        state.connect.qr.timer = window.setInterval(() => {
          const qr = state.connect.qr;
          qr.pollCount += 1;
          if (qr.pollCount >= 3) {
            stopQrPolling();
            qr.status = "ready";
            state.done.connect = true;
            state.connect.verified = true;
            render();
            window.setTimeout(() => {
              gotoStep("permission", true);
              pushNotice("扫码连接成功，已自动进入权限检查。");
            }, 300);
            return;
          }
          render();
        }, 2000);
      }

      function stopQrPolling() {
        if (state.connect.qr.timer) {
          window.clearInterval(state.connect.qr.timer);
          state.connect.qr.timer = null;
        }
      }

      function autoCheckPermission() {
        state.permission.status = "checking";
        render();
        window.setTimeout(() => {
          state.permission.checkCount += 1;
          if (state.permission.checkCount === 1) {
            state.permission.status = "missing";
          } else {
            state.permission.status = "ready";
            state.permission.pass = true;
            state.done.permission = true;
            render();
            window.setTimeout(() => {
              gotoStep("events", true);
              pushNotice("权限检查通过，已进入事件订阅。");
            }, 720);
            return;
          }
          render();
        }, 880);
      }

      function renderPermissionStep() {
        if (state.permission.status === "checking" || state.permission.status === "idle") {
          setStepContent("权限检查", "进入页面后自动检查当前权限。", `<div class="notice warn">正在检查权限，请稍候...</div>`);
          return;
        }
        if (state.permission.status === "ready") {
          setStepContent("权限检查", "权限已完整，系统会自动进入下一步。", `<div class="notice good">检查通过，正在进入事件订阅...</div>`);
          return;
        }
        if (state.permission.status === "skipped") {
          setStepContent(
            "权限检查",
            "你已选择先跳过这一步，后续仍可回到这里重新检查。",
            `<div class="notice warn">当前按已跳过处理，你可以继续后面的设置。</div>
             <ul class="line-list">${state.permission.missing.map((scope) => `<li><code>${scope}</code></li>`).join("")}</ul>
             <p class="hint"><a class="link" href="#" onclick="return false;">打开飞书后台权限配置</a></p>
             <div class="field" style="margin-top:10px">
               <label>可复制的一次性权限配置</label>
               <textarea id="scopeJson" class="textarea" readonly>{
  "scopes": {
    "tenant": [
      "drive:drive",
      "im:datasync.feed_card.time_sensitive:write"
    ],
    "user": []
  }
}</textarea>
             </div>
             <div class="row" style="margin-top:10px">
               <button id="copyScope" class="btn ghost">复制配置</button>
               <button id="permissionRecheck" class="btn secondary">重新检查</button>
               <button id="permissionContinue" class="btn primary">继续后面的设置</button>
             </div>`
          );
          document.getElementById("copyScope").onclick = async () => {
            try {
              await navigator.clipboard.writeText(document.getElementById("scopeJson").value);
              pushNotice("已复制权限配置。");
            } catch (_) {
              pushNotice("复制失败，请手动复制。", "warn");
            }
          };
          document.getElementById("permissionRecheck").onclick = () => autoCheckPermission();
          document.getElementById("permissionContinue").onclick = () => gotoStep("events", true);
          return;
        }
        setStepContent(
          "权限检查",
          "检测到缺失权限，请先在飞书后台补齐。",
          `<div class="notice bad">当前还不能进入下一步，请先补齐缺失权限。</div>
           <ul class="line-list">${state.permission.missing.map((scope) => `<li><code>${scope}</code></li>`).join("")}</ul>
           <p class="hint"><a class="link" href="#" onclick="return false;">打开飞书后台权限配置</a></p>
           <div class="field" style="margin-top:10px">
             <label>可复制的一次性权限配置</label>
             <textarea id="scopeJson" class="textarea" readonly>{
  "scopes": {
    "tenant": [
      "drive:drive",
      "im:datasync.feed_card.time_sensitive:write"
    ],
    "user": []
  }
}</textarea>
           </div>
           <div class="row" style="margin-top:10px">
             <button id="copyScope" class="btn ghost">复制配置</button>
             <button id="permissionRecheck" class="btn primary">我已处理，重新检查</button>
             <button id="permissionSkip" class="btn ghost">强制跳过这一步</button>
           </div>`
        );
        document.getElementById("copyScope").onclick = async () => {
          try {
            await navigator.clipboard.writeText(document.getElementById("scopeJson").value);
            pushNotice("已复制权限配置。");
          } catch (_) {
            pushNotice("复制失败，请手动复制。", "warn");
          }
        };
        document.getElementById("permissionRecheck").onclick = () => autoCheckPermission();
        document.getElementById("permissionSkip").onclick = () => {
          state.permission.status = "skipped";
          state.done.permission = true;
          render();
          window.setTimeout(() => {
            gotoStep("events", true);
            pushNotice("已跳过这一步，你可以继续后面的设置。", "warn");
          }, 220);
        };
      }

      function autoSendEventTest() {
        if (state.events.sent) return;
        state.events.sent = true;
        render();
        window.setTimeout(() => pushNotice("事件订阅测试提示已发送到机器人会话。"), 500);
      }

      function renderEventsStep() {
        setStepContent(
          "事件订阅",
          "进入本页会自动向机器人发送测试提示。",
          `<div class="notice warn">请到机器人会话中按指引输入固定验证词，完成事件订阅测试。</div>
           <p class="hint">如果你确认这一步已经完成，也可以直接继续下一步。</p>
           <div class="row" style="margin-top:12px"><button id="eventNext" class="btn primary">下一步</button></div>`
        );
        document.getElementById("eventNext").onclick = () => {
          state.done.events = true;
          gotoStep("callback", true);
        };
      }

      function autoSendCallbackTest() {
        if (state.callback.sent) return;
        state.callback.sent = true;
        render();
        window.setTimeout(() => pushNotice("回调测试卡片已发送到机器人会话。"), 500);
      }

      function renderCallbackStep() {
        setStepContent(
          "回调配置",
          "进入本页会自动向机器人发送回调测试卡片。",
          `<div class="notice warn">请到机器人会话中点击测试卡片按钮，确认回调可用。</div>
           <p class="hint">如果你确认这一步已经完成，也可以直接继续下一步。</p>
           <div class="row" style="margin-top:12px"><button id="callbackNext" class="btn primary">下一步</button></div>`
        );
        document.getElementById("callbackNext").onclick = () => {
          state.done.callback = true;
          gotoStep("menu", false);
        };
      }

      function renderMenuStep() {
        setStepContent(
          "菜单确认",
          "请在飞书后台完成菜单配置后继续。",
          `<div class="notice warn">如果尚未配置菜单，请先进入飞书后台完成设置。</div>
           <p class="hint"><a class="link" href="#" onclick="return false;">打开飞书后台菜单配置</a></p>
           <div class="row" style="margin-top:12px"><button id="menuNext" class="btn primary">下一步</button></div>`
        );
        document.getElementById("menuNext").onclick = () => {
          state.done.menu = true;
          gotoStep("autostart", true);
        };
      }

      function autoDetectAutostart() {
        if (state.autostart.status !== "idle") return;
        state.autostart.status = "checking";
        render();
        window.setTimeout(() => {
          state.autostart.supported = true;
          state.autostart.status = "ready";
          render();
        }, 780);
      }

      function renderAutostartStep() {
        if (state.autostart.status === "checking" || state.autostart.status === "idle") {
          setStepContent("自动启动", "正在检查当前系统是否支持自动启动。", `<div class="notice warn">检测中，请稍候...</div>`);
          return;
        }
        if (!state.autostart.supported) {
          setStepContent("自动启动", "当前系统不支持自动启动，已自动跳过。", `<div class="notice warn">当前系统不支持自动启动，正在进入 VS Code 集成...</div>`);
          window.setTimeout(() => {
            state.done.autostart = true;
            gotoStep("vscode", false);
          }, 700);
          return;
        }
        setStepContent(
          "自动启动",
          "请选择是否在登录后自动运行。",
          `<div class="tag-row"><span class="tag warn">当前默认未启用</span></div>
           <div class="row" style="margin-top:12px">
             <button id="autostartOn" class="btn primary">启用自动启动</button>
             <button id="autostartOff" class="btn ghost">保持关闭并继续</button>
           </div>`
        );
        document.getElementById("autostartOn").onclick = () => {
          state.autostart.enabledChoice = true;
          state.done.autostart = true;
          pushNotice("已启用自动启动。");
          gotoStep("vscode", false);
        };
        document.getElementById("autostartOff").onclick = () => {
          state.autostart.enabledChoice = false;
          state.done.autostart = true;
          pushNotice("自动启动保持关闭。");
          gotoStep("vscode", false);
        };
      }

      function renderVSCodeStep() {
        setStepContent(
          "VS Code 集成",
          "是否在这台机器上使用 VS Code + Codex。",
          `<div class="notice warn">如果你需要在这台机器上使用 VS Code，请完成集成。</div>
           <div class="row" style="margin-top:12px">
             <button id="vscodeYes" class="btn primary">确认集成</button>
             <button id="vscodeNo" class="btn ghost">先不使用</button>
           </div>`
        );
        document.getElementById("vscodeYes").onclick = () => {
          state.vscode.choice = true;
          state.vscode.integrated = true;
          state.done.vscode = true;
          pushNotice("VS Code 集成已完成。");
          gotoStep("done", false);
        };
        document.getElementById("vscodeNo").onclick = () => {
          state.vscode.choice = false;
          state.done.vscode = true;
          gotoStep("done", false);
        };
      }

      function renderDoneStep() {
        setStepContent(
          "欢迎使用",
          "基础设置已完成。",
          `<div class="done-card">
             <h3 class="done-title">欢迎，设置已经完成。</h3>
             <p class="done-sub">你现在可以进入管理页面，继续维护机器人、系统集成和存储清理。</p>
           </div>
           <div class="row" style="margin-top:12px">
             <a class="btn ghost" href="#" onclick="return false;">查看使用说明</a>
             <a class="btn primary" href="./web-admin-user-mock.html">去管理页面</a>
           </div>`
        );
      }

      function render() {
        renderStepList();
        switch (state.step) {
          case "env":
            renderEnvStep();
            break;
          case "connect":
            renderConnectStep();
            break;
          case "permission":
            renderPermissionStep();
            break;
          case "events":
            renderEventsStep();
            break;
          case "callback":
            renderCallbackStep();
            break;
          case "menu":
            renderMenuStep();
            break;
          case "autostart":
            renderAutostartStep();
            break;
          case "vscode":
            renderVSCodeStep();
            break;
          case "done":
            renderDoneStep();
            break;
          default:
            renderEnvStep();
        }
      }

      function escapeAttr(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      render();
      window.setTimeout(() => {
        if (state.step === "env" && state.env.status === "checking") {
          state.env.status = "ready";
          state.done.env = true;
          render();
          window.setTimeout(() => {
            gotoStep("connect", true);
            pushNotice("环境正常，已自动进入飞书连接。");
          }, 620);
        }
      }, 860);
    </script>
  </body>
</html>
