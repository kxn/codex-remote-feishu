<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Remote Onboarding/Admin Mock</title>
    <style>
      :root {
        --bg: #efe8dc;
        --bg-deep: #e4d6bf;
        --shell: rgba(255, 251, 245, 0.94);
        --panel: #fffdf9;
        --line: rgba(56, 44, 30, 0.09);
        --text: #1f2328;
        --muted: #6b7280;
        --brand: #0f766e;
        --brand-soft: rgba(15, 118, 110, 0.12);
        --warn: #b45309;
        --warn-soft: rgba(180, 83, 9, 0.14);
        --danger: #b42318;
        --danger-soft: rgba(180, 35, 24, 0.14);
        --shadow: 0 28px 60px rgba(36, 27, 18, 0.12);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-pill: 999px;
        --font-sans: "Avenir Next", "Segoe UI Variable", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-sans);
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.2), transparent 28%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.18), transparent 32%),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      }

      .workbench {
        width: min(1440px, calc(100% - 28px));
        margin: 18px auto 40px;
      }

      .control-strip {
        position: sticky;
        top: 14px;
        z-index: 20;
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(56, 44, 30, 0.08);
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.88);
        box-shadow: 0 18px 40px rgba(36, 27, 18, 0.1);
        backdrop-filter: blur(18px);
      }

      .control-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .control-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .pill-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        border: 1px solid transparent;
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        min-height: 40px;
        padding: 0 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .pill:hover {
        transform: translateY(-1px);
        border-color: rgba(15, 118, 110, 0.22);
      }

      .pill.active {
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.16), rgba(255, 255, 255, 0.95));
        border-color: rgba(15, 118, 110, 0.28);
      }

      .viewport-bar {
        margin-top: 22px;
      }

      .device-shell {
        padding: 16px;
        border: 1px solid rgba(56, 44, 30, 0.1);
        border-radius: 34px;
        background: linear-gradient(180deg, rgba(246, 239, 228, 0.95), rgba(255, 251, 245, 0.96));
        box-shadow: var(--shadow);
      }

      .browser-top {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 4px 6px 16px;
      }

      .browser-dots {
        display: inline-flex;
        gap: 7px;
      }

      .browser-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(56, 44, 30, 0.16);
      }

      .browser-address {
        flex: 1;
        min-height: 42px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(56, 44, 30, 0.08);
        color: var(--muted);
        font-size: 13px;
      }

      .viewport {
        margin-inline: auto;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid rgba(56, 44, 30, 0.08);
        background: var(--panel);
        transition: max-width 180ms ease;
      }

      .viewport[data-size="desktop"] {
        max-width: 1120px;
      }

      .viewport[data-size="mobile"] {
        max-width: 420px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(252, 248, 241, 0.92);
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f766e, #164e63);
        color: #fff;
        font-size: 15px;
        font-weight: 800;
      }

      .brand small {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .brand strong {
        font-size: 17px;
      }

      .header-status {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .status-chip {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        font-weight: 700;
      }

      .status-chip.ok {
        color: var(--brand);
        background: var(--brand-soft);
      }

      .status-chip.warn {
        color: var(--warn);
        background: var(--warn-soft);
      }

      .status-chip.danger {
        color: var(--danger);
        background: var(--danger-soft);
      }

      .app-body {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        min-height: 760px;
      }

      .viewport[data-size="mobile"] .app-body {
        grid-template-columns: 1fr;
      }

      .side-nav {
        padding: 18px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(248, 240, 230, 0.86), rgba(255, 252, 247, 0.94));
      }

      .viewport[data-size="mobile"] .side-nav {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        overflow-x: auto;
      }

      .side-nav-title {
        margin: 0 0 14px;
        font-size: 13px;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .side-items {
        display: grid;
        gap: 10px;
      }

      .viewport[data-size="mobile"] .side-items {
        display: flex;
        min-width: max-content;
      }

      .side-item {
        padding: 13px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid transparent;
      }

      .side-item.current {
        background: rgba(15, 118, 110, 0.12);
        border-color: rgba(15, 118, 110, 0.22);
      }

      .side-item.done {
        background: rgba(15, 118, 110, 0.07);
      }

      .side-item small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .side-item strong {
        display: block;
        font-size: 14px;
      }

      .screen {
        padding: 22px;
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .page-hero {
        padding: 22px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(15, 118, 110, 0.12);
        background: linear-gradient(145deg, rgba(15, 118, 110, 0.1), rgba(255, 253, 249, 0.96));
      }

      .page-hero h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.08;
      }

      .page-hero p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 16px;
      }

      .page-grid {
        display: grid;
        gap: 16px;
      }

      .page-grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .page-grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .viewport[data-size="mobile"] .page-grid.two,
      .viewport[data-size="mobile"] .page-grid.three {
        grid-template-columns: 1fr;
      }

      .surface-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
      }

      .surface-card h2,
      .surface-card h3 {
        margin: 0;
        font-size: 18px;
      }

      .surface-card p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .surface-card + .surface-card {
        margin-top: 0;
      }

      .callout {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid transparent;
      }

      .callout.ok {
        background: var(--brand-soft);
        border-color: rgba(15, 118, 110, 0.12);
      }

      .callout.warn {
        background: var(--warn-soft);
        border-color: rgba(180, 83, 9, 0.14);
      }

      .callout.danger {
        background: var(--danger-soft);
        border-color: rgba(180, 35, 24, 0.14);
      }

      .callout strong {
        display: block;
        font-size: 16px;
      }

      .callout p {
        margin: 8px 0 0;
        color: rgba(31, 35, 40, 0.78);
        line-height: 1.65;
      }

      .item-list {
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .item-list li {
        padding: 14px 14px 0 0;
      }

      .item-list strong {
        display: block;
        font-size: 15px;
      }

      .item-list span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.6;
      }

      .option-card,
      .app-card,
      .cap-card,
      .setting-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
      }

      .option-card.selected,
      .app-card.selected {
        border-color: rgba(15, 118, 110, 0.24);
        box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08);
      }

      .option-card .eyebrow,
      .app-card .eyebrow,
      .cap-card .eyebrow {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        font-weight: 700;
      }

      .eyebrow.ok {
        background: var(--brand-soft);
        color: var(--brand);
      }

      .eyebrow.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }

      .eyebrow.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .eyebrow.neutral {
        background: rgba(107, 114, 128, 0.12);
        color: #4b5563;
      }

      .option-card h3,
      .app-card h3,
      .cap-card h3,
      .setting-card h3 {
        margin: 14px 0 0;
        font-size: 18px;
      }

      .option-card p,
      .app-card p,
      .cap-card p,
      .setting-card p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .meta-list {
        margin: 16px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .meta-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        padding-top: 10px;
        border-top: 1px solid rgba(56, 44, 30, 0.08);
        color: var(--muted);
        font-size: 14px;
      }

      .meta-list li:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .meta-list span:last-child {
        text-align: right;
        color: var(--text);
        font-weight: 600;
      }

      .qr-panel {
        display: grid;
        gap: 18px;
        justify-items: center;
        text-align: center;
        padding: 28px;
        border-radius: 24px;
        border: 1px dashed rgba(15, 118, 110, 0.2);
        background: rgba(255, 255, 255, 0.84);
      }

      .qr-code {
        width: min(260px, 68vw);
        aspect-ratio: 1;
        border-radius: 22px;
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.12) 10%, transparent 10%, transparent 20%, rgba(15, 118, 110, 0.12) 20%, rgba(15, 118, 110, 0.12) 30%, transparent 30%, transparent 40%, rgba(15, 118, 110, 0.12) 40%, rgba(15, 118, 110, 0.12) 50%, transparent 50%, transparent 60%, rgba(15, 118, 110, 0.12) 60%, rgba(15, 118, 110, 0.12) 70%, transparent 70%, transparent 80%, rgba(15, 118, 110, 0.12) 80%),
          linear-gradient(rgba(15, 118, 110, 0.12) 10%, transparent 10%, transparent 20%, rgba(15, 118, 110, 0.12) 20%, rgba(15, 118, 110, 0.12) 30%, transparent 30%, transparent 40%, rgba(15, 118, 110, 0.12) 40%, rgba(15, 118, 110, 0.12) 50%, transparent 50%, transparent 60%, rgba(15, 118, 110, 0.12) 60%, rgba(15, 118, 110, 0.12) 70%, transparent 70%, transparent 80%, rgba(15, 118, 110, 0.12) 80%);
        background-size: 100% 100%;
        border: 12px solid #fff;
        box-shadow: inset 0 0 0 1px rgba(56, 44, 30, 0.06);
      }

      .summary-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .viewport[data-size="mobile"] .summary-grid {
        grid-template-columns: 1fr;
      }

      .summary-tile {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid var(--line);
      }

      .summary-tile strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .summary-tile span {
        display: block;
        line-height: 1.6;
      }

      .footer-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        min-height: 46px;
        padding: 0 18px;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(56, 44, 30, 0.08);
        background: rgba(255, 255, 255, 0.86);
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
      }

      .button.primary {
        border-color: transparent;
        background: linear-gradient(135deg, #0f766e, #115e59);
        color: #fff;
      }

      @media (max-width: 960px) {
        .app-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-status {
          justify-content: flex-start;
        }

        .page-grid.two,
        .page-grid.three {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .workbench {
          width: calc(100% - 16px);
          margin-top: 10px;
        }

        .control-strip,
        .device-shell,
        .screen,
        .side-nav {
          padding-left: 14px;
          padding-right: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="workbench">
      <div class="control-strip">
        <div class="control-row">
          <span class="control-label">画面</span>
          <div class="pill-list" id="view-list"></div>
        </div>
        <div class="control-row">
          <span class="control-label">预览</span>
          <div class="pill-list" id="viewport-list"></div>
        </div>
      </div>

      <div class="viewport-bar">
        <div class="device-shell">
          <div class="browser-top">
            <div class="browser-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="browser-address" id="browser-address"></div>
          </div>

          <div class="viewport" id="viewport" data-size="desktop">
            <div class="app-header">
              <div class="brand">
                <div class="brand-mark">CR</div>
                <div>
                  <small id="brand-kicker"></small>
                  <strong id="brand-title"></strong>
                </div>
              </div>
              <div class="header-status" id="header-status"></div>
            </div>

            <div class="app-body">
              <aside class="side-nav">
                <p class="side-nav-title" id="side-nav-title"></p>
                <div class="side-items" id="side-items"></div>
              </aside>
              <main class="screen" id="screen"></main>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const views = [
        {
          id: "setup-blocked",
          label: "环境阻断",
          route: "/setup",
          kicker: "Setup",
          title: "Codex Remote",
          headerStatus: [
            { text: "当前不能继续", tone: "danger" },
            { text: "还没有飞书应用", tone: "warn" },
          ],
          navTitle: "开通流程",
          navItems: [
            { step: "步骤 1", title: "环境检查", state: "current" },
            { step: "步骤 2", title: "当前状态", state: "" },
            { step: "步骤 3", title: "接入飞书应用", state: "" },
            { step: "步骤 4", title: "能力检查", state: "" },
            { step: "步骤 5", title: "完成", state: "" },
          ],
          body: `
            <section class="page-hero">
              <h1>先把这台机器准备好</h1>
              <p>在开始配置飞书应用之前，我们先确认这台机器已经满足最基本的运行要求。</p>
            </section>

            <div class="callout danger">
              <strong>这台机器现在还不能继续</strong>
              <p>这台机器还有基础环境问题没有解决。请先修复下面这些问题，再回来继续配置飞书应用。</p>
            </div>

            <div class="page-grid two">
              <section class="surface-card">
                <h2>需要先修复</h2>
                <ul class="item-list">
                  <li>
                    <strong>没有检测到 Codex</strong>
                    <span>系统暂时找不到 Codex。先把 Codex 安装好，或确认当前环境变量已经配置正确。</span>
                  </li>
                  <li>
                    <strong>运行环境检查没有通过</strong>
                    <span>这台机器当前还不能稳定运行会话。请先修复运行环境问题，再回来继续。</span>
                  </li>
                </ul>
              </section>

              <section class="surface-card">
                <h2>下一步</h2>
                <ul class="item-list">
                  <li>
                    <strong>重新检查环境</strong>
                    <span>修好问题以后，回到这里重新检查。</span>
                  </li>
                  <li>
                    <strong>查看修复说明</strong>
                    <span>如果你不确定怎么修，可以先看一次说明再回来。</span>
                  </li>
                </ul>
              </section>
            </div>

            <div class="footer-actions">
              <button class="button primary">重新检查环境</button>
              <button class="button">查看修复说明</button>
            </div>
          `,
        },
        {
          id: "setup-empty",
          label: "当前没有飞书应用",
          route: "/setup",
          kicker: "Setup",
          title: "Codex Remote",
          headerStatus: [
            { text: "基础环境已通过", tone: "ok" },
            { text: "当前没有可用飞书应用", tone: "warn" },
          ],
          navTitle: "开通流程",
          navItems: [
            { step: "步骤 1", title: "环境检查", state: "done" },
            { step: "步骤 2", title: "当前状态", state: "current" },
            { step: "步骤 3", title: "接入飞书应用", state: "" },
            { step: "步骤 4", title: "能力检查", state: "" },
            { step: "步骤 5", title: "完成", state: "" },
          ],
          body: `
            <section class="page-hero">
              <h1>先看一下当前状态</h1>
              <p>我们先帮你看一眼，这台机器上现在有没有已经可用的飞书应用。</p>
            </section>

            <div class="callout warn">
              <strong>当前没有检测到可用飞书应用</strong>
              <p>你还没有可以直接使用的飞书应用。下一步需要先接入一个。</p>
            </div>

            <div class="page-grid two">
              <section class="surface-card">
                <h2>当前情况</h2>
                <ul class="item-list">
                  <li>
                    <strong>基础环境</strong>
                    <span>已经通过，可以继续。</span>
                  </li>
                  <li>
                    <strong>飞书应用</strong>
                    <span>还没有检测到可用对象。</span>
                  </li>
                </ul>
              </section>

              <section class="surface-card">
                <h2>接下来会做什么</h2>
                <ul class="item-list">
                  <li>
                    <strong>新建飞书应用</strong>
                    <span>适合第一次接入，系统会引导你扫码创建。</span>
                  </li>
                  <li>
                    <strong>接入已有飞书应用</strong>
                    <span>适合你已经在飞书后台建好应用的情况。</span>
                  </li>
                </ul>
              </section>
            </div>

            <div class="footer-actions">
              <button class="button primary">开始接入飞书应用</button>
            </div>
          `,
        },
        {
          id: "setup-source",
          label: "选择来源",
          route: "/setup",
          kicker: "Setup",
          title: "Codex Remote",
          headerStatus: [
            { text: "基础环境已通过", tone: "ok" },
            { text: "正在选择来源", tone: "ok" },
          ],
          navTitle: "开通流程",
          navItems: [
            { step: "步骤 1", title: "环境检查", state: "done" },
            { step: "步骤 2", title: "当前状态", state: "done" },
            { step: "步骤 3", title: "接入飞书应用", state: "current" },

      const state = {
        activeView: views[0].id,
        viewport: "desktop",
      };

      function currentView() {
        return views.find((view) => view.id === state.activeView) || views[0];
      }

      function makeNode(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (typeof text === "string") node.textContent = text;
        return node;
      }

      function renderViewButtons() {
        const root = document.getElementById("view-list");
        root.innerHTML = "";
        for (const view of views) {
          const button = makeNode("button", `pill${view.id === state.activeView ? " active" : ""}`, view.label);
          button.type = "button";
          button.addEventListener("click", () => {
            state.activeView = view.id;
            render();
          });
          root.append(button);
        }
      }

      function renderViewportButtons() {
        const options = [
          { id: "desktop", label: "桌面" },
          { id: "mobile", label: "手机" },
        ];
        const root = document.getElementById("viewport-list");
        root.innerHTML = "";
        for (const option of options) {
          const button = makeNode("button", `pill${option.id === state.viewport ? " active" : ""}`, option.label);
          button.type = "button";
          button.addEventListener("click", () => {
            state.viewport = option.id;
            render();
          });
          root.append(button);
        }
      }

      function renderScreen() {
        const view = currentView();
        document.getElementById("browser-address").textContent = view.route;
        document.getElementById("brand-kicker").textContent = view.kicker;
        document.getElementById("brand-title").textContent = view.title;
        document.getElementById("side-nav-title").textContent = view.navTitle;
        document.getElementById("viewport").setAttribute("data-size", state.viewport);

        const headerStatus = document.getElementById("header-status");
        headerStatus.innerHTML = "";
        for (const item of view.headerStatus) {
          headerStatus.append(makeNode("span", `status-chip ${item.tone}`, item.text));
        }

        const sideItems = document.getElementById("side-items");
        sideItems.innerHTML = "";
        for (const item of view.navItems) {
          const card = makeNode("div", `side-item ${item.state}`.trim());
          card.append(makeNode("small", "", item.step));
          card.append(makeNode("strong", "", item.title));
          sideItems.append(card);
        }

        document.getElementById("screen").innerHTML = view.body;
      }

      function render() {
        renderViewButtons();
        renderViewportButtons();
        renderScreen();
      }

      render();
    </script>
